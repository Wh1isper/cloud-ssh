name: Docker

on:
  schedule:
    - cron: "17 18 * * *"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish service image
    runs-on: ubuntu-latest
    environment: Release
    env:
      GCR_REGISTRY: ${{ vars.GCR_REGISTRY || 'gcr.io' }}
      GCR_PROJECT_ID: ${{ vars.GCR_PROJECT_ID }}
      GCR_IMAGE_NAME: ${{ vars.GCR_IMAGE_NAME || 'cloud-ssh' }}
      GCR_JSON_KEY: ${{ secrets.GCR_JSON_KEY }}
    steps:
      - name: Checkout main for nightly
        if: github.event_name != 'release'
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate GCR configuration
        run: |
          if [ -z "$GCR_JSON_KEY" ]; then
            echo "::error::Set Release environment secret GCR_JSON_KEY"
            exit 1
          fi
          if [ -z "$GCR_PROJECT_ID" ]; then
            GCR_PROJECT_ID="$(python3 - <<'PY'
          import json
          import os

          print(json.loads(os.environ["GCR_JSON_KEY"])["project_id"])
          PY
          )"
            echo "GCR_PROJECT_ID=$GCR_PROJECT_ID" >> "$GITHUB_ENV"
          fi

      - name: Compute image tags
        id: meta
        run: |
          image="$GCR_REGISTRY/$GCR_PROJECT_ID/$GCR_IMAGE_NAME"
          short_sha="$(git rev-parse --short=12 HEAD)"

          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            version="${tag#v}"
            {
              echo "image=$image"
              echo "tags<<EOF"
              echo "$image:$tag"
              echo "$image:$version"
              if [ "${{ github.event.release.prerelease }}" = "false" ]; then
                echo "$image:latest"
              fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "image=$image"
              echo "tags<<EOF"
              echo "$image:nightly"
              echo "$image:nightly-$short_sha"
              echo "$image:main-$short_sha"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCR_REGISTRY }}
          username: _json_key
          password: ${{ env.GCR_JSON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=cloud-ssh
          cache-from: type=gha
          cache-to: type=gha,mode=max
